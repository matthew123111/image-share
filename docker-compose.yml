services:
  image-share:
    container_name: image-share
    build:
      context: .
    restart: unless-stopped
    ports:
      - "${PORT:-8000}:8000"
    environment:
      HOST: 0.0.0.0
      PORT: 8000
      DATA_DIR: /data
      UPLOAD_DIR: /data/uploads
      METADATA_DIR: /data/metadata
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-25}
      BASE_URL: ${BASE_URL:-}
    volumes:
      - ./data:/data
